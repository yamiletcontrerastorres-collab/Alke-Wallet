<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Alke-Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="transactions.html">Transacciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="deposit.html">Depositos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="sendmoney.html">Enviar Dinero</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active  bg-white bg-opacity-10 rounded-5" aria-current="page" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>



  <!--INICIO SESION/LOGIN/FORMULARIO-->
  <main class="container text-light mb-2 mt-4">
    <section class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 bg-secondary bg-opacity-25 rounded mt-1">
        <hr>

        <header>
          <h1 class="text-center">Inicio de Sesión</h1>
        </header>

        <!--Alerta Bootstrap-->

        <div class="text-center" id="alert-container"></div>

        <form id="formLogin" class="m-auto">

          <div class="mb-3">
            <label for="email" class="form-label">Email:</label>
            <input type="email" class="form-control text-center" id="email" name="email" placeholder="Usuario" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña:</label>
            <input type="password" class="form-control text-center" id="password" name="password"
              placeholder="Contraseña" required>
          </div>

          <div>
            <button type="submit" class="form-control">
              Ingresar
            </button>
            <p class="fw-bold small text-center mb-0">¿Olvidaste tu Contraseña?</p>
          </div>

        </form>
      </div>
      </div>
    </section>
  </main>

  <footer class=" text-light text-center">
    <p class="mb-0">© 2026 Alke-Wallet • Tu billetera digital</p>
  </footer>

  <script src="js/login.js"></script>

  <div id="loader" class="loader hidden">
    <div class="spinner"></div>
    <p>Verificando Credenciales</p>
  </div>

<script src="js/navbar.js"></script>

</body>

</html>
