<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
    crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Alke-Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Inicio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="transactions.html">Transacciones</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active  bg-white bg-opacity-10 rounded-5" aria-current="page"
              href="deposit.html">Depositos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="sendmoney.html">Enviar Dinero</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="menu.html">Menu</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Loader -->
<div id="loader" class="hidden">
  <div class="spinner"></div>
</div>

  <!--main-->

  <main class="container text-light mt-4">
    <section class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 bg-secondary bg-opacity-25 rounded mt-1 ">
        <hr>
        <header>
          <h1 class="text-center">Depositos</h1>
        </header>


        <h5 class="text-center mb-3">
          Saldo actual:
          <span id="saldoActual"></span>
        </h5>
        <form id="deposit-form">
          <label for="deposit" class="mt-3 mb-4">Monto a depositar</label>
          <input type="number" id="monto" class="form-control mb-3 text-center" placeholder="Ingrese monto">
          <button type="submit" class="form-control mt-4 mb-5">
            Realizar Deposito
          </button>
        </form>
        <!-- Contenedor para mostrar mensajes de éxito o error -->
        <div id="mensajeDeposito" class="mt-3"></div>
        <div id="alert-container" class="mt-3"></div>
      </div>
    </section>
  </main>

  <!--footer-->
  <footer class=" text-light text-center">
    <p class="mb-0">© 2026 Alke-Wallet • Tu billetera digital</p>
  </footer>

  <script src="js/deposit.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
