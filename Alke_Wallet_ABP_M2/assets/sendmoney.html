<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wallet - Enviar Dinero</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-dark">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
    <div class="container">
      <a class="navbar-brand fw-bold" href="#">Alke-Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Transacciones</a></li>
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósitos</a></li>
          <li class="nav-item"><a class="nav-link active bg-white bg-opacity-10 rounded-5" href="sendmoney.html">Enviar
              Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Loader -->
<div id="loader" class="hidden">
  <div class="spinner"></div>Un momento...
</div>

  <!-- MAIN -->
  <main class="container text-light mb-4 mt-4">
    <section class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6 bg-secondary bg-opacity-25 rounded p-4">
        <h1 class="text-center">Enviar Dinero</h1>

        <!-- Botón para abrir modal -->

        <button type="button" id="btnAddContact" class="btn btn-outline-light w-100 mb-3">Agregar Nuevo
          Contacto</button>


        <!-- Buscador -->
        <div>
          <label for="exampleDataList" class="form-label">Buscar en Agenda de Contactos</label>
          <input class="form-control mb-1" list="datalistOptions" id="exampleDataList"
            placeholder="Buscar por nombre, CBU o alias">
          <datalist id="datalistOptions">
            <option value="Jose Perez">
            <option value="Maria Lopez">
            <option value="Juan Gonzalez">
            <option value="Carlos Ramirez">
            <option value="Ana Torres">
          </datalist>
        </div>

        <!-- Alertas -->
        <div id="alert-container"></div>



        <!-- Modal -->
        <div id="modalContact" class="hidden">
          <div class="modal-content bg-light rounded p-3 bg-dark	bg-opacity-10 text-light">
            <span id="cerrarModal" class="btn-close float-end"></span>
            <h4 class="mb-3">Agregar Nuevo Contacto</h4>
            <form id="contactForm">
              <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre y Apellido" required>
              <input type="text" id="cbu" class="form-control mb-2" placeholder="Número de CBU" required>
              <input type="text" id="alias" class="form-control mb-2" placeholder="Alias" required>
              <input type="text" id="banco" class="form-control mb-2" placeholder="Nombre del Banco" required>
              <button type="submit" class="btn btn-dark bg-dark bg-opacity-50 w-100">Guardar
                Contacto</button>
            </form>
          </div>
        </div>

        <!-- Formulario de envío -->
        <form id="sendForm">
          <select id="contacto" class="form-select mb-3"></select>

          <label class="form-label">Monto</label>
          <input type="number" id="montoTransferencia" class="form-control mb-3" placeholder="Monto a enviar">

          <button id="btnTransferir" type="submit" class="btn bg-dark bg-opacity-10 w-100" disabled>
            Transferir
          </button>
        </form>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="text-light text-center py-3">
    <p class="mb-0">© 2026 Alke-Wallet • Tu billetera digital</p>
  </footer>

  <script src="js/sendmoney.js"></script>
  <script src="js/navbar.js"></script>
</body>

</html>
